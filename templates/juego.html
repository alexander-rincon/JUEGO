<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Piedra, Papel o Tijera - Online</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='estilos.css') }}" />
  </head>
  <body>
    <main class="app">
      <header class="top">
        <div class="brand">
          <h1 class="title">Piedra · Papel · Tijera</h1>
          <p class="subtitle">Multijugador en tiempo real</p>
        </div>
        <div class="room">
          <div class="room__label">Sala</div>
          <div class="room__id" id="roomId">{{ room_id }}</div>
          <a class="room__link" id="shareLink" href="#">Abrir enlace</a>
        </div>
      </header>

      <section class="panel">
        <div class="panel__row">
          <div class="pill" id="connectionPill">Conectando...</div>
          <div class="pill pill--accent" id="youAre">—</div>
        </div>

        <div class="status" id="statusText">Cargando sala...</div>

        <div class="players" id="playersBox">
          <div class="player">
            <div class="player__name">Jugador 1</div>
            <div class="player__state" id="p1State">—</div>
          </div>
          <div class="player">
            <div class="player__name">Jugador 2</div>
            <div class="player__state" id="p2State">—</div>
          </div>
        </div>

        <div class="countdown" id="countdownBox" aria-live="polite">
          <div class="countdown__label" id="countdownLabel">Comienza en</div>
          <div class="countdown__value" id="countdownValue">—</div>
        </div>

        <div class="actions">
          <button class="btn btn--rock" id="btnPiedra" data-choice="piedra" disabled>
            Piedra
          </button>
          <button class="btn btn--paper" id="btnPapel" data-choice="papel" disabled>
            Papel
          </button>
          <button class="btn btn--scissors" id="btnTijera" data-choice="tijera" disabled>
            Tijera
          </button>
        </div>

        <section class="result" id="resultBox" aria-live="polite">
          <div class="result__big" id="resultBig">—</div>
          <div class="result__detail" id="resultDetail"></div>
        </section>
      </section>

      <footer class="footer">
        <div class="share">
          <div class="share__left">
            <div class="hint">
              Comparte este enlace para que entre el segundo jugador:
              <span class="hint__mono" id="shareUrlText">—</span>
            </div>
            <div class="share__actions">
              <button class="btn btn--paper share__copy" id="copyBtn" type="button">Copiar enlace</button>
              <div class="share__msg" id="copyMsg"></div>
            </div>
          </div>
          <div class="qr">
            <div class="qr__label">Escanea el QR</div>
            <img class="qr__img" id="qrImg" alt="QR de la sala" />
            <div class="qr__code">
              Código:
              <span class="qr__mono" id="roomCode">{{ room_id }}</span>
            </div>
          </div>
        </div>
      </footer>
    </main>

    <script>
      window.__ROOM_ID__ = "{{ room_id }}";
      window.__MODE__ = "{{ mode|default('duel') }}";
      window.__MAX_PLAYERS__ = {{ max_players|default(2) }};
    </script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js" crossorigin="anonymous" onerror="this.onerror=null;this.src='/socket.io/socket.io.js';"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
  </body>
</html>
