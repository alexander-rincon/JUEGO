<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Piedra, Papel o Tijera - Online</title>
    <link rel="stylesheet" href="/static/estilos.css" />
  </head>
  <body>
    <main class="app">
      <header class="top">
        <div class="brand">
          <h1 class="title">Piedra · Papel · Tijera</h1>
          <p class="subtitle">Multijugador en tiempo real</p>
        </div>
        <div class="room">
          <div class="room__label">Sala</div>
          <div class="room__id" id="roomId"><%= room_id %></div>
          <a class="room__link" id="shareLink" href="#">Abrir enlace</a>
        </div>
      </header>

      <section class="panel">
        <div class="panel__row">
          <div class="pill" id="connectionPill">Conectando...</div>
          <div class="pill pill--accent" id="youAre">—</div>
        </div>

        <div class="status" id="statusText">Cargando sala...</div>
        <div class="hint" id="matchScore"></div>

        <div class="players" id="playersBox">
          <div class="player" id="p1Card">
            <div class="player__row">
              <img class="player__avatar" id="p1Avatar" alt="Jugador 1" referrerpolicy="no-referrer" />
              <div class="player__name" id="p1Name">Jugador 1</div>
            </div>
            <div class="player__state" id="p1State">—</div>
            <img class="player__throw" id="p1Throw" alt="Jugada Jugador 1" hidden />
          </div>
          <div class="player" id="p2Card">
            <div class="player__row">
              <img class="player__avatar" id="p2Avatar" alt="Jugador 2" referrerpolicy="no-referrer" />
              <div class="player__name" id="p2Name">Jugador 2</div>
            </div>
            <div class="player__state" id="p2State">—</div>
            <img class="player__throw" id="p2Throw" alt="Jugada Jugador 2" hidden />
          </div>
        </div>

        <div class="countdown" id="countdownBox" aria-live="polite">
          <div class="countdown__label" id="countdownLabel">Comienza en</div>
          <div class="countdown__value" id="countdownValue">—</div>
        </div>

        <div class="actions">
          <button class="btn btn--rock" id="btnPiedra" data-choice="piedra" disabled>
            Piedra
          </button>
          <button class="btn btn--paper" id="btnPapel" data-choice="papel" disabled>
            Papel
          </button>
          <button class="btn btn--scissors" id="btnTijera" data-choice="tijera" disabled>
            Tijera
          </button>
        </div>

        <section class="result" id="resultBox" aria-live="polite">
          <div class="result__big" id="resultBig">—</div>
          <div class="result__detail" id="resultDetail"></div>
        </section>

        <section class="adminDash" id="duelAdminBox" hidden>
          <div class="adminDash__title">Admin de la sala</div>
          <div class="adminDash__row" style="grid-template-columns: 1fr 1fr;">
            <div class="adminDash__box">
              <div class="adminDash__label">Jugador 1</div>
              <div class="hint" style="margin-top:10px">Elección: <span class="hint__mono" id="duelAdminP1Choice">—</span></div>
            </div>
            <div class="adminDash__box">
              <div class="adminDash__label">Jugador 2</div>
              <div class="hint" style="margin-top:10px">Elección: <span class="hint__mono" id="duelAdminP2Choice">—</span></div>
            </div>
          </div>
        </section>
      </section>
    </main>

    <script>
      window.__ROOM_ID__ = "<%= room_id %>";
      window.__MODE__ = "<%= (mode || 'duel') %>";
      window.__MAX_PLAYERS__ = <%= (typeof max_players === 'number' ? max_players : 2) %>;
    </script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js" crossorigin="anonymous" onerror="this.onerror=null;this.src='/socket.io/socket.io.js';"></script>
    <script src="/static/script.js"></script>
  </body>
</html>
