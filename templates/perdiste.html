<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Perdiste</title>
    <link rel="stylesheet" href="/static/estilos.css" />
    <style>
      body{background:#050711}
      .loseWrap{
        min-height: 100vh;
        display:flex;
        align-items:center;
        justify-content:center;
        padding: 28px 18px;
      }
      .loseStage{
        width: min(980px, 100%);
        text-align:center;
      }
      .loseTxt{
        font-weight: 950;
        letter-spacing: .6px;
        font-size: clamp(34px, 6.2vw, 70px);
        color: rgba(234,242,255,.96);
        text-shadow: 0 0 22px rgba(110,243,255,.22);
      }
      .loseTxt--sub{
        margin-top: 10px;
        font-weight: 950;
        font-size: clamp(28px, 5.2vw, 62px);
        color: rgba(234,242,255,.94);
        text-shadow: 0 0 22px rgba(110,243,255,.18);
      }
      .fadeOut{animation: fadeOut 1.2s ease forwards}
      .fallFade{animation: fallFade 3.2s ease forwards}
      @keyframes fadeOut{
        0%{opacity:1; transform: translateY(0)}
        100%{opacity:0; transform: translateY(-18px)}
      }
      @keyframes fallFade{
        0%{opacity:0; transform: translateY(-10px)}
        18%{opacity:1; transform: translateY(0)}
        100%{opacity:0; transform: translateY(80px)}
      }
      .exitVideo{
        margin: 18px auto 0 auto;
        width: min(980px, 100%);
        border-radius: 18px;
        border: 1px solid rgba(234,242,255,.12);
        box-shadow: 0 18px 60px rgba(0,0,0,.55);
        background: rgba(7,10,20,.35);
        display:none;
      }
      .tapBtn{
        display:none;
        margin: 14px auto 0 auto;
        width: min(420px, 100%);
      }
    </style>
  </head>
  <body>
    <div class="loseWrap">
      <div class="loseStage">
        <div class="loseTxt" id="lose1">PERDISTE</div>
        <div class="loseTxt loseTxt--sub" id="lose2" style="opacity:0">MUCHAS GRACIAS POR PARTICIPAR</div>
        <video class="exitVideo" id="exitVideo" playsinline preload="auto" autoplay>
          <source src="/static/rps/salida.mp4" type="video/mp4" />
        </video>
        <button class="btn btn--paper tapBtn" id="tapBtn" type="button">Tocar para activar sonido</button>
      </div>
    </div>
    <script>
      const lose1 = document.getElementById("lose1");
      const lose2 = document.getElementById("lose2");
      const v = document.getElementById("exitVideo");
      const tapBtn = document.getElementById("tapBtn");
      const GO = "https://tiktok.com/@estebanquito2026";
      const wait = (ms) => new Promise((r) => setTimeout(r, ms));
      let redirected = false;
      let playbackStarted = false;
      let redirectTimer = 0;

      function goTikTok() {
        if (redirected) return;
        redirected = true;
        try {
          window.location.assign(GO);
        } catch {
          try {
            window.location.href = GO;
          } catch {}
        }
      }

      async function forceSound() {
        if (!v) return false;
        try {
          v.muted = false;
          v.volume = 1;
        } catch {}
        try {
          await v.play();
        } catch {}
        await wait(120);
        const stillMuted = Boolean(v && v.muted);
        if (stillMuted) {
          if (tapBtn) tapBtn.style.display = "block";
          return false;
        }
        if (tapBtn) tapBtn.style.display = "none";
        return true;
      }

      async function ensureVideoPlaying() {
        if (!v) return false;
        let ok = false;
        try {
          v.muted = false;
          v.volume = 1;
          await v.play();
          ok = true;
        } catch {}
        if (!ok) {
          try {
            v.muted = true;
            v.volume = 1;
            await v.play();
            ok = true;
          } catch {}
        }
        if (!ok && tapBtn) tapBtn.style.display = "block";
        return ok;
      }

      async function run() {
        await wait(2200);
        if (lose1) lose1.classList.add("fadeOut");
        await wait(1300);
        if (lose1) lose1.style.display = "none";
        if (lose2) {
          lose2.style.opacity = "1";
        }
        await wait(4200);
        if (lose2) {
          lose2.classList.add("fallFade");
        }
        await wait(3400);
        if (lose2) lose2.style.display = "none";
        if (v) v.style.display = "block";
        await ensureVideoPlaying();
        await forceSound();
      }

      if (tapBtn) {
        tapBtn.addEventListener("click", async () => {
          tapBtn.style.display = "none";
          await forceSound();
        });
      }

      document.body.addEventListener("pointerdown", async () => {
        if (!v) return;
        if (!v.muted) return;
        if (tapBtn) tapBtn.style.display = "none";
        await forceSound();
      }, { passive: true });

      if (v) {
        v.addEventListener("playing", () => {
          playbackStarted = true;
          if (redirectTimer) clearTimeout(redirectTimer);
          const d = Number(v.duration);
          const t = Number(v.currentTime);
          if (Number.isFinite(d) && Number.isFinite(t) && d > 0 && d >= t) {
            redirectTimer = setTimeout(() => goTikTok(), Math.ceil((d - t) * 1000) + 900);
          }
        });
        v.addEventListener("ended", () => goTikTok());
        v.addEventListener("timeupdate", () => {
          if (!playbackStarted) return;
          const d = Number(v.duration);
          const t = Number(v.currentTime);
          if (Number.isFinite(d) && Number.isFinite(t) && d > 0 && t >= d - 0.2) goTikTok();
        });
      }

      run();
    </script>
  </body>
</html>
