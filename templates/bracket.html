<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bracket</title>
    <link rel="stylesheet" href="/static/estilos.css" />
  </head>
  <body class="page--bracket">
    <main class="app app--bracket">
      <header class="top">
        <div class="brand">
          <h1 class="title">Bracket</h1>
          <p class="subtitle">8 cuadros · 2 salas por cuadro (parejas)</p>
        </div>
        <div class="bracketControls" id="bracketControls">
          <button class="btn btn--paper" id="bracketX2" type="button">X2</button>
          <button class="btn btn--paper" id="bracketX5" type="button">X5</button>
          <button class="btn btn--paper" id="bracketX10" type="button">X10</button>
          <button class="btn btn--rock" id="bracketStartBtn" type="button" style="margin-left: 20px;">INICIAR SALAS</button>
        </div>
      </header>

      <section class="panel">
        <div class="panel__row" style="align-items:center">
          <div class="status" id="bracketStatus" style="margin-top:0">Cargando...</div>
          <div class="pill pill--accent" id="bracketPrizePill">Premio: —</div>
        </div>
        <div class="brTablesGrid" id="brTablesGrid"></div>
      </section>
    </main>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js" crossorigin="anonymous" onerror="this.onerror=null;this.src='/socket.io/socket.io.js';"></script>
    <script>
      (function () {
        const statusEl = document.getElementById("bracketStatus");
        const prizePill = document.getElementById("bracketPrizePill");
        const grid = document.getElementById("brTablesGrid");

        const BTN_8 = document.getElementById("bracketX2");
        const BTN_16 = document.getElementById("bracketX5");
        const BTN_32 = document.getElementById("bracketX10");
        const START_BTN = document.getElementById("bracketStartBtn");
        const CONTROLS = document.getElementById("bracketControls");

        // Mostrar siempre los controles (solo lo vemos nosotros)
        if (CONTROLS) {
          CONTROLS.hidden = false;
        }

        if (START_BTN) {
          START_BTN.addEventListener("click", () => {
            if (confirm("¿Iniciar todas las salas listas?")) {
              sock.emit("lobby_start_ready_duels", {});
            }
          });
        }

        let currentSize = 32;
        let currentMatchCodes = [];
        let liveByRoomId = new Map();

        function esc(s) {
          return String(s || "")
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#039;");
        }

        function normalizeHandle(v) {
          const raw = String(v || "").trim();
          if (!raw) return "";
          return raw.startsWith("@") ? raw : `@${raw}`;
        }

        function fmtPrize(v) {
          const n = Number.isFinite(Number(v)) ? Number(v) : 0;
          return n.toLocaleString("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 0 });
        }

        function setActiveButtons(size) {
          const map = { 8: BTN_8, 16: BTN_16, 32: BTN_32 };
          for (const k of [BTN_8, BTN_16, BTN_32]) if (k) k.classList.remove("btn--selected");
          if (map[size]) map[size].classList.add("btn--selected");
        }

        function choiceImg(choice) {
          const c = String(choice || "").toLowerCase().trim();
          if (c === "piedra") return "/static/rps/PIEDRA.png";
          if (c === "papel") return "/static/rps/PAPEL.png";
          if (c === "tijera") return "/static/rps/TIJERA.png";
          return "";
        }

        function pickHtml(choice) {
          const img = choiceImg(choice);
          if (!img) return `<span class="brPickText">—</span>`;
          return `<img class="brPickIcon" src="${esc(img)}" alt="${esc(choice)}" />`;
        }

        function playerRowHtml(handle, avatar, choice, extraClass) {
          const h = normalizeHandle(handle);
          const a = String(avatar || "").trim() || "/static/rps/INI1.png";
          const cls = extraClass ? `brPlayerRow ${extraClass}` : "brPlayerRow";
          return `<div class="${cls}">
            <img class="brPlayerAvatar" src="${esc(a)}" alt="${esc(h || "Jugador")}" referrerpolicy="no-referrer" />
            <div class="brPlayerName">${esc(h || "—")}</div>
            <div class="brPlayerPick">${pickHtml(choice)}</div>
          </div>`;
        }

        function matchCardHtml(mc) {
          if (!mc) {
            return `<div class="brDuelCard brDuelCard--empty">
              <div class="brDuelHead">
                <div class="brDuelTitle">Sala</div>
                <div class="brDuelMeta">—</div>
              </div>
              <div class="brPlayers">
                ${playerRowHtml("", "", "")}
                ${playerRowHtml("", "", "")}
              </div>
            </div>`;
          }

          const rid = String(mc.room_id || "").trim();
          const live = rid ? (liveByRoomId.get(rid) || null) : null;
          const state = live ? String(live.state || "") : "";
          // Ocultar jugadas si la sala está jugando (se ven solo al final del tiempo)
          const p1c = (live && state !== "playing") ? String(live.p1_choice || "") : "";
          const p2c = (live && state !== "playing") ? String(live.p2_choice || "") : "";

          const p1 = normalizeHandle(mc.p1_handle || "");
          const p2 = normalizeHandle(mc.p2_handle || "");
          const a1 = String(mc.p1_avatar || "").trim();
          const a2 = String(mc.p2_avatar || "").trim();

          const sc1 = Number.isFinite(Number(mc.p1_score)) ? Number(mc.p1_score) : 0;
          const sc2 = Number.isFinite(Number(mc.p2_score)) ? Number(mc.p2_score) : 0;
          const rNow = Number.isFinite(Number(mc.round)) ? Number(mc.round) : 0;
          const rTot = Number.isFinite(Number(mc.rounds_total)) ? Number(mc.rounds_total) : 3;
          const meta = rNow ? `Marcador ${sc1}-${sc2} · R${rNow}/${rTot}` : (sc1 || sc2 ? `Marcador ${sc1}-${sc2}` : "—");
          const finished = Boolean(mc && mc.finished);
          const win = finished ? normalizeHandle(mc.winner_handle || "") : "";
          const lose = finished ? normalizeHandle(mc.loser_handle || "") : "";
          const p1Class = win && p1 && win === p1 ? "brPlayerRow--winner" : (lose && p1 && lose === p1 ? "brPlayerRow--loser" : "");
          const p2Class = win && p2 && win === p2 ? "brPlayerRow--winner" : (lose && p2 && lose === p2 ? "brPlayerRow--loser" : "");
          const winnerText = win ? ` · GANADOR ${win}` : "";

          // Boton para admin
          const viewBtn = rid ? `<button class="brViewBtn" onclick="window.open('/juego/${esc(rid)}', '_blank')">VER SALA</button>` : "";

          return `<div class="brDuelCard">
            <div class="brDuelHead">
              <div class="brDuelHeadMain">
                <div class="brDuelTitle">Sala ${esc(String(mc.index || ""))} ${viewBtn}</div>
                <div class="brDuelMeta">${esc(meta)}${state ? ` · ${esc(state)}` : ""}${winnerText ? esc(winnerText) : ""}</div>
              </div>
            </div>
            <div class="brPlayers">
              ${playerRowHtml(p1, a1, p1c, p1Class)}
              ${playerRowHtml(p2, a2, p2c, p2Class)}
            </div>
          </div>`;
        }

        function sizeFromLobby(payload) {
          const bSize = payload && Number.isFinite(payload.bracket_size) ? payload.bracket_size : 0;
          if (bSize === 8 || bSize === 16 || bSize === 32) return bSize;
          return currentSize;
        }

        function stageRoundNumber(subtreeSize) {
          const s = Number(subtreeSize);
          if (!Number.isFinite(s) || s <= 0) return 1;
          const r = Math.round(Math.log2(s)) + 1;
          return Math.max(1, Math.min(6, r));
        }

        function matchCodesForBracket(size, matchCodes) {
          const list = Array.isArray(matchCodes) ? matchCodes.slice(0) : [];
          list.sort((a, b) => (Number(a && a.index) || 0) - (Number(b && b.index) || 0));
          const max = size / 2;
          const out = [];
          for (const mc of list) {
            const idx = Number(mc && mc.index);
            if (!Number.isFinite(idx)) continue;
            if (idx < 1 || idx > max) continue;
            out.push(mc);
          }
          return out;
        }

        function activeSubtreeForStage(size, matchCodes) {
          const list = matchCodesForBracket(size, matchCodes);
          let minUnfinished = Infinity;
          let maxAny = 1;
          for (const mc of list) {
            const sub = mc && Number.isFinite(Number(mc.subtree_size)) ? Number(mc.subtree_size) : 1;
            const hasPlayers = Boolean(normalizeHandle(mc && mc.p1_handle) || normalizeHandle(mc && mc.p2_handle));
            const hasHist = Boolean(mc && Array.isArray(mc.history) && mc.history.length);
            if (sub > maxAny) maxAny = sub;
            if (!hasPlayers && !hasHist) continue;
            const finished = Boolean(mc && mc.finished);
            if (!finished && sub < minUnfinished) minUnfinished = sub;
          }
          if (Number.isFinite(minUnfinished)) return minUnfinished;
          return maxAny;
        }

        function render() {
          if (!grid) return;
          const stageSub = activeSubtreeForStage(currentSize, currentMatchCodes);
          const listAll = matchCodesForBracket(currentSize, currentMatchCodes);
          const stageMatches = listAll.filter((mc) => {
            const sub = mc && Number.isFinite(Number(mc.subtree_size)) ? Number(mc.subtree_size) : 1;
            if (sub !== stageSub) return false;
            const hasPlayers = Boolean(normalizeHandle(mc && mc.p1_handle) || normalizeHandle(mc && mc.p2_handle));
            const hasHist = Boolean(mc && Array.isArray(mc.history) && mc.history.length);
            return hasPlayers || hasHist;
          });
          stageMatches.sort((a, b) => (Number(a && a.index) || 0) - (Number(b && b.index) || 0));

          const boxes = [];
          const boxCount = Math.max(1, Math.ceil(stageMatches.length / 2));
          for (let b = 0; b < boxCount; b += 1) {
            const m1 = stageMatches[b * 2] || null;
            const m2 = stageMatches[b * 2 + 1] || null;
            const duelHtml = [m1, m2].filter(Boolean).map((m) => matchCardHtml(m)).join("");
            boxes.push(`<section class="brTableCard" data-stage-sub="${esc(String(stageSub))}">
              <div class="brTableHead">
                <div class="brTableTitle">Cuadro ${b + 1}</div>
                <div class="brTableSub">4 jugadores · 2 salas</div>
              </div>
              <div class="brDuels">
                ${duelHtml || matchCardHtml(null)}
              </div>
            </section>`);
          }
          grid.innerHTML = boxes.join("");
          if (statusEl) statusEl.textContent = `Ronda ${stageRoundNumber(stageSub)} · ${stageMatches.length || 0} salas`;
        }

        function setSize(size) {
          currentSize = size === 8 || size === 16 || size === 32 ? size : 32;
          setActiveButtons(currentSize);
          render();
        }

        if (BTN_8) BTN_8.addEventListener("click", () => setSize(8));
        if (BTN_16) BTN_16.addEventListener("click", () => setSize(16));
        if (BTN_32) BTN_32.addEventListener("click", () => setSize(32));

        const sock = window.io ? window.io({ transports: ["websocket", "polling"] }) : null;
        if (!sock) return;

        sock.on("connect", () => {
          sock.emit("join", { room_id: "LOBBY", mode: "lobby_participants" });
        });

        sock.on("lobby_state", (payload) => {
          currentSize = sizeFromLobby(payload);
          setActiveButtons(currentSize);
          currentMatchCodes = (payload && Array.isArray(payload.match_codes)) ? payload.match_codes : [];
          const prize = payload && Number.isFinite(payload.prize_value) ? payload.prize_value : 0;
          if (prizePill) prizePill.textContent = `Premio: ${prize ? fmtPrize(prize) : "—"}`;
          const winners = payload && Array.isArray(payload.winners) ? payload.winners : [];
          const champ = winners && winners[0] && winners[0].handle ? normalizeHandle(winners[0].handle) : "";
          if (champ && statusEl) statusEl.textContent = `CAMPEÓN: ${champ}`;
          render();
        });

        sock.on("lobby_live_state", (payload) => {
          const list = payload && Array.isArray(payload.rooms) ? payload.rooms : [];
          liveByRoomId = new Map(list.map((r) => [String((r && r.room_id) || "").trim(), r]));
          render();
        });

        sock.on("error_message", (payload) => {
          if (statusEl && payload && payload.text) statusEl.textContent = payload.text;
        });

        setSize(32);
      })();
    </script>
  </body>
</html>
