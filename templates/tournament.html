<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Torneo</title>
    <link rel="stylesheet" href="/static/estilos.css" />
  </head>
  <body>
    <main class="app">
      <header class="top">
        <div class="brand">
          <h1 class="title">Torneo</h1>
          <p class="subtitle"><% if (prize) { %>Premio: <%= prize %><% } else { %>Piedra · Papel · Tijera<% } %></p>
        </div>
      </header>

      <section class="panel">
        <div class="panel__row">
          <div class="pill" id="connectionPill">Conectando...</div>
          <div class="pill pill--accent" id="youAre">—</div>
        </div>

        <div class="status" id="statusText">Conectando al torneo...</div>

        <section class="tournament" id="tournamentBox">
          <div class="tournament__row">
            <div class="pill pill--accent" id="tournamentRole">—</div>
            <button class="btn btn--scissors" id="generateBracketBtn" type="button" hidden>
              Repartir jugadores
            </button>
            <button class="btn btn--paper" id="startNextBtn" type="button" hidden>
              Iniciar siguiente pelea
            </button>
          </div>

          <div class="tournament__lobby" id="tournamentLobby">
            <div class="tournament__title">Sala en vivo</div>
            <div class="tournament__hint" id="tournamentCount">—</div>
            <div class="tournament__players" id="tournamentPlayersList"></div>
          </div>

          <div class="tournament__active" id="tournamentActive" hidden>
            <div class="tournament__activeLeft">
              <div class="tournament__match" id="activeMatchText">—</div>
              <div class="tournament__throws" id="throwsBox" hidden>
                <div class="tournament__throw" id="throwP1Card">
                  <div class="tournament__throwName" id="throwP1Name">—</div>
                  <div class="tournament__throwIcon" id="throwP1Icon">—</div>
                  <div class="tournament__throwText" id="throwP1Text">—</div>
                </div>
                <div class="tournament__throw" id="throwP2Card">
                  <div class="tournament__throwName" id="throwP2Name">—</div>
                  <div class="tournament__throwIcon" id="throwP2Icon">—</div>
                  <div class="tournament__throwText" id="throwP2Text">—</div>
                </div>
              </div>
            </div>
            <button class="btn btn--rock" id="readyBtn" type="button" hidden>
              Estoy listo
            </button>
          </div>

          <div class="tournament__bracket">
            <div class="tournament__title">Llaves</div>
            <div class="tournament__bracketList" id="bracketList"></div>
          </div>
        </section>

        <div class="countdown" id="countdownBox" aria-live="polite">
          <div class="countdown__label" id="countdownLabel">Comienza en</div>
          <div class="countdown__value" id="countdownValue">—</div>
        </div>

        <div class="actions">
          <button class="btn btn--rock" id="btnPiedra" data-choice="piedra" disabled>Piedra</button>
          <button class="btn btn--paper" id="btnPapel" data-choice="papel" disabled>Papel</button>
          <button class="btn btn--scissors" id="btnTijera" data-choice="tijera" disabled>Tijera</button>
        </div>

        <section class="result" id="resultBox" aria-live="polite">
          <div class="result__big" id="resultBig">—</div>
          <div class="result__detail" id="resultDetail"></div>
        </section>
      </section>
    </main>

    <script>
      window.__ROOM_ID__ = "<%= room_id %>";
      window.__MODE__ = "tournament";
      window.__PLAYER_KEY__ = "<%= (player_key || '') %>";
      window.__SPECTATOR_KEY__ = "<%= (spectator_key || '') %>";
      window.__PRIZE__ = "<%= (prize || '') %>";
      window.__BATTLE_SECONDS__ = <%= (typeof battle_seconds === 'number' ? battle_seconds : 60) %>;
      window.__COUNTDOWN_SECONDS__ = <%= (typeof countdown_seconds === 'number' ? countdown_seconds : 3) %>;
    </script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js" crossorigin="anonymous" onerror="this.onerror=null;this.src='/socket.io/socket.io.js';"></script>
    <script src="/static/script.js"></script>

    <div class="fx" id="tournamentFx" hidden>
      <div class="fx__overlay"></div>
      <div class="fx__card" role="status" aria-live="polite">
        <div class="fx__spark"></div>
        <div class="fx__badge" id="tournamentFxBadge">—</div>
        <div class="fx__name" id="tournamentFxName">—</div>
        <div class="fx__sub" id="tournamentFxSub">—</div>
      </div>
    </div>
  </body>
</html>
