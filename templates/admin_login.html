<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin - Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='estilos.css') }}" />
  </head>
  <body>
    <main class="app">
      <header class="top">
        <div class="brand">
          <h1 class="title">Admin</h1>
          <p class="subtitle">Iniciar sesión</p>
        </div>
      </header>

      <section class="panel">
        <div class="panel__row">
          <div class="pill pill--warn">Login</div>
          <div class="pill pill--accent">Organizador</div>
        </div>

        <div class="status">Ingresa usuario y contraseña.</div>

        <section class="admin">
          {% if error %}
            <div class="join__error">{{ error }}</div>
          {% endif %}
          <form class="admin__form" action="{{ url_for('admin_login') }}" method="post">
            <input type="hidden" name="next" value="{{ next_url }}" />
            <label class="admin__field">
              <span class="admin__label">Usuario</span>
              <input class="admin__input" type="text" name="username" placeholder="Escribe tu usuario" autocomplete="username" required />
            </label>
            <label class="admin__field">
              <span class="admin__label">Contraseña</span>
              <input class="admin__input" type="password" name="password" placeholder="Escribe tu contraseña" autocomplete="current-password" required />
            </label>
            <button class="btn btn--rock" type="submit">Entrar</button>
          </form>
        </section>
      </section>
    </main>
  </body>
</html>
